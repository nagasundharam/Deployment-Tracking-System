services:
  # Backend Service (Node.js/Express)
  backend:
    build: 
      context: ./Backend
      dockerfile: Dockerfile
    ports:
      - "${DATABASE_PORT}:5000"
    environment:
      - MONGO_URI=${MONGO_URI}
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=production
    restart: always

  # Frontend Service (React/Vite)
  frontend:
    build: 
      context: ./Frontend/deployment-tracker
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always